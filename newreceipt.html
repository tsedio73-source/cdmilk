<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Live Records</title>
    <style>
        body { font-family: Helvetica, sans-serif; background: #f4f4f4; padding: 20px; padding-bottom: 120px; margin: 0; }
        .header { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin: 0; font-size: 20px; }
        .grid { display: flex; flex-direction: column; gap: 15px; }
        .card {
            background: white; border-radius: 12px; padding: 15px;
            border-left: 5px solid #5F6BEF; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card p { margin: 4px 0; font-size: 14px; color: #444; }
        .card .val { font-weight: bold; color: #000; float: right; }
        .btn-copy {
            width: 100%; padding: 12px; background: #5F6BEF; color: white;
            border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer;
        }
        .loading-box { text-align: center; padding: 50px; color: #666; }
        .bottom-summary {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a1a1a; color: white; padding: 15px;
            display: flex; justify-content: space-around;
            border-top: 3px solid #5F6BEF;
        }
        .summary-item { text-align: center; }
        .summary-item b { display: block; font-size: 18px; color: #4ade80; }
        .filter-badge { font-size: 12px; color: #5F6BEF; font-weight: normal; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2>Records: <span id="dater" style="color:#5F6BEF;">...</span></h2>
    <span id="filterDisp" class="filter-badge"></span>
    <button class="btn-copy" onclick="copyAllRecords()">📋 Copy Report</button>
</div>

<div id="loading" class="loading-box">🔄 Loading...</div>
<div id="data-list" class="grid"></div>

<div class="bottom-summary">
    <div class="summary-item">Total Weight <b id="grandWeight">0.00 kg</b></div>
    <div class="summary-item">Total Amount <b id="grandAmount">₹0.00</b></div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzq81qLe8X5R2hYkfv3iHHqJNeCchZGmAxEou5QUZH96r7M69PgiAkT7HUaCcMyns442g/exec";

    // ── SIRF sessionStorage ───────────────────────────────────────────────────
    function sGet(key) { try { return sessionStorage.getItem(key); } catch(e) { return null; } }

    function parseEntryDate(val) {
        if (!val) return null;
        const str = String(val).trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
            const [y, m, d] = str.split('-');
            return new Date(+y, +m - 1, +d).getTime();
        }
        if (str.includes('/')) {
            const parts = str.split('/');
            const day   = parseInt(parts[0]);
            const month = parseInt(parts[1]) - 1;
            const year  = parts[2].length === 2 ? 2000 + parseInt(parts[2]) : parseInt(parts[2]);
            return new Date(year, month, day).getTime();
        }
        const d = new Date(str);
        return isNaN(d) ? null : d.getTime();
    }

    function formatDisplay(val) {
        if (!val) return 'N/A';
        const str = String(val).trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
            const [y, m, d] = str.split('-');
            return `${d}/${m}/${y.slice(-2)}`;
        }
        if (str.includes('/')) return str;
        const dObj = new Date(str);
        if (!isNaN(dObj)) {
            const day   = String(dObj.getDate()).padStart(2, '0');
            const month = String(dObj.getMonth() + 1).padStart(2, '0');
            const year  = String(dObj.getFullYear()).slice(-2);
            return `${day}/${month}/${year}`;
        }
        return str;
    }

    function copyAllRecords() {
        const from = sGet('fromDate');
        const to   = sGet('toDate');
        const text = document.getElementById('data-list').innerText;
        const ta   = document.createElement('textarea');
        ta.value   = `MILK REPORT\nFrom: ${formatDisplay(from)}  To: ${formatDisplay(to)}\n\n${text}`;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert("✅ Report copied!");
    }

    async function fetchRangeData() {
        // ── sirf sessionStorage se lo ─────────────────────────────────────────
        const fromDate = sGet('fromDate');
        const toDate   = sGet('toDate');
        const code     = sGet('code');

        const container = document.getElementById('data-list');
        const loading   = document.getElementById('loading');

        if (!fromDate || !toDate) {
            container.innerHTML = "<p style='text-align:center'>⚠️ Please select dates first!</p>";
            loading.style.display = "none";
            return;
        }

        document.getElementById("dater").innerText = `${formatDisplay(fromDate)} → ${formatDisplay(toDate)}`;
        document.getElementById("filterDisp").innerText = "";

        try {
            const res     = await fetch(`${scriptURL}?action=read&code=${encodeURIComponent(code)}`);
            const allData = await res.json();

            loading.style.display = "none";
            container.innerHTML   = "";

            const [fy, fm, fd] = fromDate.split('-').map(Number);
            const [ty, tm, td] = toDate.split('-').map(Number);
            const start = new Date(fy, fm - 1, fd, 0, 0, 0).getTime();
            const end   = new Date(ty, tm - 1, td, 23, 59, 59).getTime();

            const filteredData = allData.filter(row => {
                const dateMs = parseEntryDate(row.entryid) || parseEntryDate(row.date);
                if (!dateMs) return false;
                return dateMs >= start && dateMs <= end;
            });

            if (filteredData.length === 0) {
                container.innerHTML = `<p style='text-align:center;color:#888'>
                    ❌ No records found for selected dates.<br>
                    <small>From: ${fromDate} To: ${toDate}</small>
                </p>`;
                return;
            }

            let totalW = 0, totalA = 0;

            filteredData.reverse().forEach(row => {
                let w   = parseFloat(row.weight) || 0;
                let amt = parseFloat(row.totalamount) || 0;
                totalW += w;
                totalA += amt;

                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <p>Date:   <span class="val">${formatDisplay(row.date)}</span></p>
                    <p>Type:   <span class="val">${row.type || 'N/A'}</span></p>
                    <p>FAT:    <span class="val">${row.fat || 0}%</span></p>
                    <p>SNF:    <span class="val">${row.snf || 0}</span></p>
                    <p>Water:  <span class="val">${row.water || 0}%</span></p>
                    <p>Rate:   <span class="val">₹${row.rate || 0}</span></p>
                    <p>Weight: <span class="val">${w.toFixed(2)} kg</span></p>
                    <p style="border-top:1px solid #eee;padding-top:5px;margin-top:5px;">
                        Amount: <span class="val" style="color:#5F6BEF">₹${amt.toFixed(2)}/-</span>
                    </p>
                `;
                container.appendChild(card);
            });

            document.getElementById('grandWeight').innerText = totalW.toFixed(2) + " kg";
            document.getElementById('grandAmount').innerText  = "₹" + totalA.toFixed(2);

        } catch (e) {
            loading.style.display = "none";
            container.innerHTML = "<p style='text-align:center;color:red'>❌ Error loading data.</p>";
            console.error(e);
        }
    }

    fetchRangeData();
</script>
</body>
</html>
