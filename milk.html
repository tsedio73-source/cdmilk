<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Offline Database</title>
    <style>
        :root {
            --primary: #50AD1C;
            --glass: rgba(255, 255, 255, 0.15);
        }
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images.jpeg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 90%;
            max-width: 450px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.4);
            background: white;
            color: #333;
            font-size: 16px;
            box-sizing: border-box;
        }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(80, 173, 28, 0.4);
            transition: 0.3s;
        }
        button:disabled { background: #888; cursor: not-allowed; }
        .status-msg {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🥛 Milk Entry</h2>

    <div class="form-group">
        <label>Date</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label>Type</label>
        <select id="type">
            <option value="Buffalo">Buffalo</option>
            <option value="Cow">Cow</option>
            <option value="Mix">Mix</option>
        </select>
    </div>

    <div class="row">
        <div class="form-group">
            <label>Weight (Ltr)</label>
            <input type="number" id="weight" step="0.1" placeholder="0.0">
        </div>
        <div class="form-group">
            <label>Water</label>
            <input type="number" id="water" step="0.1" value="0">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>FAT</label>
            <input type="number" id="fat" step="0.1" placeholder="0.0">
        </div>
        <div class="form-group">
            <label>SNF</label>
            <input type="number" id="snf" step="0.1" placeholder="0.0">
        </div>
    </div>

    <div class="form-group">
        <label>Rate (₹)</label>
        <input type="number" id="rate" placeholder="0.00">
    </div>

    <button id="saveBtn" onclick="sendData()">Save</button>
    <div id="msg" class="status-msg"></div>
</div>

<script>
    // Auto-fill today's date
    document.getElementById('date').valueAsDate = new Date();

    async function sendData() {
        const btn = document.getElementById('saveBtn');
        const msg = document.getElementById('msg');

        const scriptURL = 'https://script.google.com/macros/s/AKfycbyuQtjA1NXRxUm_-AIqgQlWG9Vtd5ZGUGZWl2Dzbr_lp-curuTAsWK3-ojBPhyMvHHHsg/exec';

        // ✅ YYYY-MM-DD (input value)
        const entryIdVal = document.getElementById('date').value; // "2026-03-08"

        // ✅ DD/MM/YY banana - parts sahi order mein
        const parts = entryIdVal.split('-');
        // parts[0]=2026, parts[1]=03, parts[2]=08
        const displayDate = `${parts[2]}/${parts[1]}/${parts[0].slice(-2)}`; // "08/03/26"

        const milkData = {
            name:      localStorage.getItem('username') || "Guest",
            code:      localStorage.getItem('code')     || "N/A",
            // ✅ Column A: "2026-03-08"
            date:      displayDate,  // ✅ Column B: "08/03/26"
            timestamp: entryIdVal,  // ✅ Same DD/MM/YY
            type:      document.getElementById('type').value,
            weight:    document.getElementById('weight').value,
            water:     document.getElementById('water').value,
            fat:       document.getElementById('fat').value,
            snf:       document.getElementById('snf').value,
            rate:      document.getElementById('rate').value
        };

        if (!milkData.weight || !milkData.rate) {
            alert("⚠️ Weight and Rate are required!");
            return;
        }

        btn.disabled      = true;
        btn.innerText     = "Saving...";
        msg.style.display = "block";
        msg.innerText     = "Sending to Server...";

        try {
            await fetch(scriptURL, {
                method:  'POST',
                mode:    'no-cors',
                cache:   'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(milkData)
            });

            msg.innerText     = "Saved!";
            msg.style.color   = "#4ade80";
            msg.style.display = "block";

            setTimeout(() => window.location.reload(), 2000);

        } catch (error) {
            console.error(error);
            msg.innerText   = "❌ Network Error!";
            msg.style.color = "#ff4444";
            btn.disabled    = false;
            btn.innerText   = "Try Again";
        }
    }
</script>

</body>
</html>
