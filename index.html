<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk App Login</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('images.jpeg');
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Helvetica, sans-serif;
        }
        #container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            align-items: center;
            width: 80%;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        input, button {
            border-radius: 12px;
            width: 100%;
            height: 50px;
            font-size: 18px;
            border: none;
            outline: none;
        }
        input {
            padding: 0 15px;
            box-sizing: border-box;
            background: white;
        }
        button {
            background-color: #5F6BEF;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active { transform: scale(0.95); }
        .loading { color: white; display: none; }
    </style>
</head>
<body>

<div id="container">
    <h2 style="color: #fff; margin-bottom: 20px;">Welcome</h2>
    
    <input id="username" placeholder="Enter your name">
    <input type="number" id="code" placeholder="Enter your code">
    
    <button id="btn" onclick="goto()">Login</button>
    
    <p id="p" class="loading">Creating your space, please wait...</p>
    
    <p style="color: #ddd; font-size: 12px; margin-top: 20px;">&reg; Powered by Tsedio</p>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbydV7TyhFE0vIcLG1kgEctJBXK-mEqO3feNJ1GUNZnjW5tWftR5oxVm20VY1lmE_FpO5Q/exec'; // Apna URL yahan dalein

    async function goto() {
        const username = document.getElementById("username").value.trim();
        const code = document.getElementById("code").value.trim();
        const btn = document.getElementById("btn");
        const p = document.getElementById("p");

        if (!username || !code) {
            alert("Name and Code are required!");
            return;
        }

        // UI Update
        btn.style.display = "none";
        p.style.display = "block";

        try {
            // Google Sheet ko batana ki naya user aaya hai
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: username, code: code, action: 'login' })
            });

            // Local storage me data save karna
            localStorage.setItem("username", username);
            localStorage.setItem("code", code);
            localStorage.setItem("login", "logged");

            // Redirect to main page
            window.location.href = "main.html";
        } catch (e) {
            alert("Internet Error! Check your connection.");
            btn.style.display = "block";
            p.style.display = "none";
        }
    }

    // Auto check login status
    window.onload = function() {
        if(localStorage.getItem("login") === "logged") {
          function lock(){
       
       let enter = prompt("Enter PIN");
       let pass = localStorage.getItem("pin");
       if(enter == pass){
       window.location.href="index.html"
}else{
    btn.style.display = "none";
    username.value = "Incorrect Password" 
    username.style.color = "red" ;
    code.style.display = "none" 
}
    
}
 if(localStorage.getItem("pin")){
lock();
}else{
    window.location.href="index.html" 
}

            
        }
    }
</script>
</body>
</html>
