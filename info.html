<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body {
            background-image: url('images.jpeg');
            font-family: Helvetica;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .data2 {
            width: 320px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: #1686FF85;
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
        }
        .data2 span {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 45px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
        }
        #newR, #newW, #newreceipt { background: #B3C556; }
        #earn, #weight, #allreceipt { background: #FF9E00; }
        #dateshow { font-size: 12px; background: #EBF6C385; }

        .loading { animation: shimmer 1.2s infinite alternate; }
        @keyframes shimmer { from { opacity: 1; } to { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="data2">
        <span>Avl Amount:</span>
        <span id="newR" class="loading">₹...</span>

        <span id="dateshow">Loading...</span>
        <span id="newW" class="loading">...kg</span>

        <span>New Receipt:</span>
        <span onclick="gonewrec()" id="newreceipt" class="loading">...</span>

        <span>Total Earning:</span>
        <span id="earn" class="loading">₹...</span>

        <span>Total Supply:</span>
        <span id="weight" class="loading">...kg</span>

        <span>All Receipt:</span>
        <span id="allreceipt" class="loading">...</span>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwcca5zGgaYrLTWU2Yt2OI_62RrtB1JiF25OgKrMu9aHSLULL2yAxwibCOlGerBuH78JQ/exec";

        // ── ONLY sessionStorage (auto-clears on tab/browser close) ───────────
        function sGet(key)        { try { return sessionStorage.getItem(key); }    catch(e) { return null; } }
        function sSet(key, value) { try { sessionStorage.setItem(key, value); }    catch(e) {} }
        function sClear()         { try { sessionStorage.clear(); }                catch(e) {} }

        // ── CODE: URL se lao (har baar naya code URL mein aana chahiye) ──────
        const urlParams  = new URLSearchParams(window.location.search);
        const urlCode    = urlParams.get('code');
        const storedCode = sGet('code');

        let code = '';

        if (urlCode) {
            if (urlCode !== storedCode) {
                // Naya user — session saaf karo
                sClear();
            }
            code = urlCode;
            sSet('code', code);
        } else {
            // URL mein code nahi — session se lo (same tab navigation)
            code = storedCode || '';
        }

        // ── NAVIGATION ────────────────────────────────────────────────────────
        function gonewrec() {
            window.location.href = "newreceipt.html" + (code ? `?code=${code}` : '');
        }

        // ── DATE HELPERS ──────────────────────────────────────────────────────
        function formatDisplay(val) {
            if (!val) return 'N/A';
            const str = String(val).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
                const [y, m, d] = str.split('-');
                return `${d}/${m}/${y.slice(-2)}`;
            }
            return str;
        }

        function toYMD(val) {
            if (!val) return null;
            const str = String(val).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
            if (str.includes('/')) {
                const p = str.split('/');
                if (p.length === 3) {
                    const d = p[0].padStart(2, '0');
                    const m = p[1].padStart(2, '0');
                    const y = p[2].length === 2 ? '20' + p[2] : p[2];
                    return `${y}-${m}-${d}`;
                }
            }
            const dt = new Date(val);
            if (!isNaN(dt)) {
                return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
            }
            return null;
        }

        function stopLoading() {
            document.querySelectorAll('.loading').forEach(el => el.classList.remove('loading'));
        }

        // ── MAIN LOAD ─────────────────────────────────────────────────────────
        async function loadDashboardData() {
            const fromDate = sGet("fromDate");
            const toDate   = sGet("toDate");

            document.getElementById("dateshow").innerText =
                (fromDate && toDate)
                    ? `${formatDisplay(fromDate)} - ${formatDisplay(toDate)}`
                    : "No Filter Set";

            if (!code) {
                stopLoading();
                document.getElementById("dateshow").innerText = "❌ No User Code";
                return;
            }

            try {
                const res     = await fetch(`${scriptURL}?action=read&code=${encodeURIComponent(code)}`);
                const allData = await res.json();

                let fullWeight = 0, fullAmount = 0;
                let filteredWeight = 0, filteredAmount = 0, filteredCount = 0;

                allData.forEach(r => {
                    const rowW = parseFloat(r.weight)      || 0;
                    const rowA = parseFloat(r.totalamount) || 0;

                    fullWeight += rowW;
                    fullAmount += rowA;

                    const rowYMD = toYMD(r.entryid) || toYMD(r.date);
                    if (rowYMD && fromDate && toDate) {
                        if (rowYMD >= fromDate && rowYMD <= toDate) {
                            filteredWeight += rowW;
                            filteredAmount += rowA;
                            filteredCount++;
                        }
                    }
                });

                document.getElementById("newR").innerText       = "₹" + filteredAmount.toFixed(2);
                document.getElementById("newW").innerText       = filteredWeight.toFixed(2) + "kg";
                document.getElementById("newreceipt").innerText = filteredCount;

                document.getElementById("earn").innerText       = "₹" + fullAmount.toFixed(2);
                document.getElementById("weight").innerText     = fullWeight.toFixed(2) + "kg";
                document.getElementById("allreceipt").innerText = allData.length;

            } catch (e) {
                console.error("Data Load Error:", e);
                document.getElementById("dateshow").innerText = "❌ Load Failed";
            } finally {
                stopLoading();
            }
        }

        window.onload = () => {
            loadDashboardData();
            setInterval(loadDashboardData, 30000);
        };
    </script>
</body>
</html>
